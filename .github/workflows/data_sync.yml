name: Monthly Data Sync

on:
  schedule:
    - cron: '0 0 1 * *' # Run at 00:00 on the 1st of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data_pipeline/requirements.txt

      - name: Run Sync Script
        run: python data_pipeline/sync_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/summary_stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated data sync $(date +%F)" && git push)
